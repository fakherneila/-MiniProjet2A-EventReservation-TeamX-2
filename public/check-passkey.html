<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passkey Support Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3>Passkey/WebAuthn Support Checker</h3>
            </div>
            <div class="card-body">
                <div id="results"></div>
                
                <div class="mt-4">
                    <h5>System Information:</h5>
                    <pre id="systemInfo"></pre>
                </div>
                
                <div class="mt-4">
                    <button class="btn btn-primary" onclick="runChecks()">Run Checks Again</button>
                    <a href="/login" class="btn btn-secondary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function logResult(message, isSuccess = true) {
            const resultsDiv = document.getElementById('results');
            const alertClass = isSuccess ? 'alert-success' : 'alert-danger';
            const icon = isSuccess ? '✓' : '✗';
            resultsDiv.innerHTML += `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    <strong>${icon}</strong> ${message}
                </div>
            `;
        }
        
        async function runChecks() {
            document.getElementById('results').innerHTML = '';
            
            // Check 1: Browser support
            if (window.PublicKeyCredential) {
                logResult('WebAuthn is supported by your browser');
            } else {
                logResult('WebAuthn is NOT supported by your browser', false);
            }
            
            // Check 2: Platform authenticator
            if (window.PublicKeyCredential && typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function') {
                const isAvailable = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                if (isAvailable) {
                    logResult('Platform authenticator (fingerprint/face ID) is available');
                } else {
                    logResult('Platform authenticator NOT available', false);
                }
            } else {
                logResult('Cannot check platform authenticator', false);
            }
            
            // Check 3: Cross-platform authenticator
            if (window.PublicKeyCredential && typeof PublicKeyCredential.isConditionalMediationAvailable === 'function') {
                const isAvailable = await PublicKeyCredential.isConditionalMediationAvailable();
                if (isAvailable) {
                    logResult('Conditional mediation (passkey autofill) is available');
                } else {
                    logResult('Conditional mediation NOT available', false);
                }
            }
            
            // Check 4: Get supported algorithms
            if (window.PublicKeyCredential && PublicKeyCredential.getClientCapabilities) {
                const capabilities = await PublicKeyCredential.getClientCapabilities();
                logResult(`Supported capabilities: ${Object.keys(capabilities).filter(k => capabilities[k]).join(', ')}`);
            }
            
            // System info
            const sysInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack
            };
            document.getElementById('systemInfo').textContent = JSON.stringify(sysInfo, null, 2);
            
            // Recommendations
            if (navigator.platform.toLowerCase().includes('linux')) {
                logResult('Linux detected - Passkey support may be limited. Consider using hardware security key or password login.', false);
            }
        }
        
        // Auto-run on load
        runChecks();
    </script>
</body>
</html>
